{% extends "base.html" %}

<!--
  Adds a "Search the Library Drive" box to the announcement bar on every
  page. Submitting opens Google Drive search scoped to the library folder,
  with the typed query inserted (q = "<query> parent:<folderId>").
-->
{% block announce %}
<form class="drive-search"
      onsubmit="window.open('https://drive.google.com/drive/search?q=' + encodeURIComponent(this.q.value.trim()) + '%20parent:1VlywV-4QWgV_UgFvXyYZmKwtyBtH705x', '_blank', 'noopener'); return false;">
  <label for="drive-q">Search the Library Drive</label>
  <input id="drive-q" name="q" type="text" placeholder="title or text…" autocomplete="off">
  <button type="submit">Search ↗</button>
</form>
{% endblock %}
