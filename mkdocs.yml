site_name: Citadel Wiki
site_description: A wiki for the Citadel
site_url: https://ihavedna.github.io/citadel-wiki/
repo_url: https://github.com/ihavedna/citadel-wiki
repo_name: ihavedna/citadel-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.sections
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - About: about.md
