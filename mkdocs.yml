site_name: The Kallarai Library
site_description: The Kallarai Library
# site_url is internal plumbing (required by navigation.instant); not shown.
site_url: https://ihavedna.github.io/citadel-wiki/
# repo_url + edit_uri power the per-page "edit this markdown" pencil. The
# header repo link it would normally add is hidden via wizard.css.
repo_url: https://github.com/ihavedna/citadel-wiki
edit_uri: edit/main/docs/

# Home (index.md) is reached via the header logo, so it's kept out of the
# left nav; this stops the strict build warning about it.
not_in_nav: |
  index.md

theme:
  name: material
  custom_dir: overrides
  favicon: assets/favicon.svg
  # Web fonts only — EB Garamond from Google Fonts.
  font:
    text: EB Garamond
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  # Single warm "parchment" scheme — the wizard.css theme paints the rest.
  palette:
    scheme: default
    primary: brown
    accent: red

extra_css:
  - stylesheets/wizard.css

extra_javascript:
  - javascripts/drive-search.js
  - javascripts/header-links.js
  - javascripts/recent-changes.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  # Tags listing is placed by the <!-- material/tags --> marker in tags-labels.md
  - tags

# Build-time hooks: fill marker comments with generated content.
#   <!-- recent-changes --> → table from git history
#   <!-- site-tree -->      → nested tree of the whole nav
hooks:
  - hooks/recent_changes.py
  - hooks/site_tree.py
  - hooks/auto_nav.py

