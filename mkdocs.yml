site_name: Citadel Wiki
site_description: A wiki for the Citadel
site_url: https://ihavedna.github.io/citadel-wiki/
repo_url: https://github.com/ihavedna/citadel-wiki
repo_name: ihavedna/citadel-wiki
edit_uri: edit/main/docs/

theme:
  name: material
  # Web fonts only — EB Garamond from Google Fonts.
  font:
    text: EB Garamond
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.action.edit
    - content.code.copy
    - toc.follow
  # Single warm "parchment" scheme — the wizard.css theme paints the rest.
  palette:
    scheme: default
    primary: brown
    accent: red

extra_css:
  - stylesheets/wizard.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - About: about.md
  - The Kallarai Library:
      - kallarai-library/index.md
      - About the Library: kallarai-library/about.md
      - Original Texts & Primary Sources:
          - kallarai-library/original-texts/index.md
          - Current Events: kallarai-library/original-texts/current-events.md
          - Historical & Ancient Texts: kallarai-library/original-texts/historical-ancient-texts.md
          - Partial & Ciphered Texts: kallarai-library/original-texts/partial-ciphered-texts.md
          - Artifacts & Discoveries: kallarai-library/original-texts/artifacts-discoveries.md
          - "The Vigil Expedition: Notes and Observations": kallarai-library/original-texts/vigil-expedition.md
          - Ademeni's Experiment Notes: kallarai-library/original-texts/ademeni-experiment-notes.md
          - "Ritual: Rite of Gathered Malice": kallarai-library/original-texts/rite-of-gathered-malice.md
          - Journals & Excerpts from Philemon the Necromancer: kallarai-library/original-texts/philemon-journals.md
          - Vampiric Rite to Kahsithiel: kallarai-library/original-texts/vampiric-rite-kahsithiel.md
          - "495: Journal Entries from the Swamps beyond Vonor": kallarai-library/original-texts/journal-entries-swamps-vonor.md
      - Books & Publications: kallarai-library/books-publications.md
      - Journals & Personal Works: kallarai-library/journals-personal-works.md
      - Additional References & Documents: kallarai-library/additional-references.md
      - Tags & Labels: kallarai-library/tags-labels.md
      - "OOG: Templates":
          - kallarai-library/templates/index.md
          - TEMPLATE for Original Texts & Primary Sources: kallarai-library/templates/template-original-texts.md
          - TEMPLATE for Books & Publications: kallarai-library/templates/template-books-publications.md
          - TEMPLATE for Journals & Personal Works: kallarai-library/templates/template-journals-personal-works.md
