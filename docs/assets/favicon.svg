<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- A stack of three books, in the Kallarai Library pigments -->
  <g stroke="#2A1A0E" stroke-width="1.4" stroke-linejoin="round">
    <!-- bottom book (azurite) -->
    <rect x="3.5"  y="21.5" width="25" height="6" rx="1.3" fill="#0047AB"/>
    <!-- middle book (gold) -->
    <rect x="5.5"  y="15"   width="22" height="6" rx="1.3" fill="#9A7818"/>
    <!-- top book (vermillion) -->
    <rect x="4"    y="8.5"  width="23.5" height="6" rx="1.3" fill="#960018"/>
  </g>
  <!-- page edges (cream stripe along the front of each book) -->
  <g fill="#FAF0D0">
    <rect x="5"   y="25"   width="22.5" height="1.4" rx="0.7"/>
    <rect x="7"   y="18.5" width="19.5" height="1.4" rx="0.7"/>
    <rect x="5.5" y="12"   width="20.5" height="1.4" rx="0.7"/>
  </g>
  <!-- bookmark ribbon on the top book -->
  <rect x="22" y="8.5" width="2.4" height="8" fill="#E8CC60" stroke="#2A1A0E" stroke-width="0.8"/>
</svg>
